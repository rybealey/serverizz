name: Build & Deploy to cPanel

# Builds the Next.js app on GitHub's runners (real node_modules, no memory cap,
# Turbopack works fine) and ships the result to the cPanel server over SSH.
# The server only RUNS the app — it never builds — which sidesteps the
# CloudLinux memory cap, the Turbopack/symlink conflict, and the prod-only
# install that broke on-server builds.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once (avoids the CloudLinux app lock).
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  SSH_HOST: 144.202.33.187
  SSH_PORT: "22"
  SSH_USER: serverizz
  REMOTE_PATH: repositories/website
  NODE_VERSION: "24"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # NEXT_PUBLIC_* is inlined into the client bundle at build time, so the
        # Turnstile site key must be present HERE (not just in the server's
        # runtime env). The site key is public; store it as a repo Variable.
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload build to server
        # The CageFS jail has no rsync (only tar), so we stream a tar archive
        # over ssh instead. node_modules is excluded so the CloudLinux selector's
        # symlink is preserved; .env*/.htaccess are excluded so the server's
        # copies survive. Stale .next build output is removed before extraction
        # so deleted routes/chunks don't linger (rsync --delete equivalent).
        run: |
          tar czf - \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./node_modules' \
            --exclude='./tmp' \
            --exclude='*.log' \
            --exclude='./.htaccess' \
            --exclude='./.env*' \
            -C . . \
          | ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
              "mkdir -p '$REMOTE_PATH' && rm -rf '$REMOTE_PATH/.next' && tar xzf - -C '$REMOTE_PATH'"

      - name: Install runtime deps & restart app
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "source ~/nodevenv/$REMOTE_PATH/*/bin/activate && cd ~/$REMOTE_PATH && npm install --omit=dev && mkdir -p tmp && touch tmp/restart.txt"
